server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — route all non-asset paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Prevent caching of index.html so deployments propagate immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache static assets aggressively (Vite content-hashes them)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
