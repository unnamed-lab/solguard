version: "3.9"

services:
  # ── Backend: SolGuard API + Yellowstone stream ────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solguard-backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs       # persist decision + lifecycle JSONL
      - ./state:/app/state     # persist lastProcessedSlot checkpoint
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 25s
      retries: 3

  # ── Frontend: React dashboard (served via nginx) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solguard-frontend
    ports:
      - "5173:80"        # browse to http://localhost:5173
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
